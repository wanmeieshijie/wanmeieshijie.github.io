<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分类 - 魔法手记-啊勇</title>
<link rel="stylesheet" href="css/style.css">
<script src="config.js"></script>
</head>
<body data-page="category">
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">🧸 魔法手记-啊勇</a>
    <button class="menu-toggle" id="menu-toggle" aria-label="菜单">☰</button>
    <ul class="nav-links" id="nav-links">
      <script>
        if (typeof CONFIG !== 'undefined' && CONFIG.nav) {
          for (var i = 0; i < CONFIG.nav.length; i++) {
            var item = CONFIG.nav[i];
            document.write('<li><a href="' + item.url + '">' + item.icon + ' ' + item.label + '</a></li>');
          }
        }
      </script>
      <li><button class="theme-toggle" id="theme-btn" aria-label="切换主题">🌙</button></li>
    </ul>
  </div>
</nav>

<div class="hero" id="hero">
  <script>
    if (typeof CONFIG !== 'undefined' && CONFIG.hero && CONFIG.hero.enable) {
      var hero = document.getElementById('hero');
      var h = window.innerWidth <= 768 ? (CONFIG.hero.heightMobile || 160) : (CONFIG.hero.heightPC || 280);
      hero.style.setProperty('--hero-height', h + 'px');
      hero.style.height = h + 'px';
      var imgUrl = CONFIG.hero.imgUrl || '';
      var mask = CONFIG.hero.maskGradient || 'rgba(255,240,245,0.4),rgba(220,235,255,0.4)';
      hero.innerHTML = '<img class="hero-img" src="' + imgUrl + '" alt="hero" onerror="this.style.display=\'none\'">'
        + '<div class="hero-overlay" style="background:linear-gradient(135deg,' + mask + ')">'
        + '<h1 class="hero-title">' + (CONFIG.hero.mainTitle || '') + '</h1>'
        + '<p class="hero-sub">' + (CONFIG.hero.subTitle || '') + '</p>'
        + '</div>';
    }
  </script>
</div>

<main class="main">
  <div class="container">
    <div class="page-header">
      <h1>🏷️ 文章分类</h1>
      <p>按兴趣分类的小世界</p>
    </div>
    <div id="category-list">
      <div class="loading"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p id="footer-text"></p>
  <script>
    if (typeof CONFIG !== 'undefined' && CONFIG.site) {
      document.getElementById('footer-text').textContent = '© ' + (CONFIG.site.since || '2026') + ' ' + (CONFIG.site.footer || '');
    }
  </script>
</footer>

<script src="js/snow.js"></script>
<script src="js/main.js"></script>
</body>
</html>
